{% extends 'products/product_list.html' %}
{% load static %}

{% block content %}
<!-- Giữ nguyên nội dung của trang danh sách sản phẩm bằng block.super -->
{{ block.super }}

<!-- Hiển thị khối màu mờ và form dưới dạng modal đè lên trên trang chủ (danh sách) -->
<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
        /* Background mờ tối */
        backdrop-filter: blur(3px);
        /* Hiệu ứng làm mờ trang chủ */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        box-sizing: border-box;
    }

    .modal-content {
        background-color: #fceceb;
        width: 600px;
        max-width: 95%;
        max-height: 95vh;
        overflow-y: auto;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        color: #333;
        font-family: Arial, sans-serif;
    }

    .modal-page-title {
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 20px;
        margin-top: 0;
    }

    .modal-layout-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .modal-left-col {
        display: flex;
        flex-direction: column;
    }

    .modal-card {
        background: #fff;
        border-radius: 8px;
        padding: 15px 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .modal-form-group {
        margin-bottom: 12px;
    }

    .modal-form-group:last-child {
        margin-bottom: 0;
    }

    .modal-form-label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 13px;
    }

    .modal-form-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #eaeaea;
        border-radius: 6px;
        background-color: #fff;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        box-sizing: border-box;
        outline: none;
        font-size: 13px;
        color: #555;
    }

    .modal-right-col {
        display: flex;
        flex-direction: column;
    }

    .modal-desc-card {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        padding: 0;
    }

    .modal-desc-wrapper {
        background: #fff;
        border-radius: 8px;
        padding: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .modal-desc-textarea {
        flex-grow: 1;
        width: 100%;
        border: none;
        background-color: transparent;
        box-sizing: border-box;
        padding: 10px;
        resize: none;
        outline: none;
        min-height: 300px;
        color: #555;
        font-family: Arial, sans-serif;
        font-size: 13px;
    }

    .modal-action-buttons {
        display: flex;
        justify-content: flex-end;
        margin-top: 15px;
    }

    .modal-btn {
        padding: 10px 0;
        border-radius: 8px;
        font-weight: bold;
        font-size: 13px;
        cursor: pointer;
        border: none;
        text-decoration: none;
        display: block;
        width: 100%;
        text-align: center;
        transition: 0.2s;
    }

    .modal-btn-cancel {
        background-color: #f46262;
        color: white;
    }

    .modal-btn-cancel:hover {
        background-color: #e35252;
    }
</style>

<div class="modal-overlay">
    <div class="modal-content">
        <div class="modal-layout-grid">
            <div class="modal-left-col">
                <div class="modal-page-title">Xem chi tiết sản phẩm</div>
                <div class="modal-card">
                    <div class="modal-form-group">
                        <label class="modal-form-label">Mã sản phẩm</label>
                        <input type="text" class="modal-form-input" value="{{ product.MaSP|default:'SP001' }}" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Tên sản phẩm</label>
                        <input type="text" class="modal-form-input" value="{{ product.TenSP|default:'Áo phông' }}" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Loại sản phẩm</label>
                        <input type="text" class="modal-form-input" value="{{ product.LoaiSP|default:'Áo' }}" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Giá bán</label>
                        <input type="text" class="modal-form-input"
                            value="{{ product.Gia|floatformat:0|default:'145.000' }}đ" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Size</label>
                        <input type="text" class="modal-form-input" value="{{ product.Size|default:'S' }}" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Màu sắc</label>
                        <input type="text" class="modal-form-input" value="{{ product.MauSac|default:'Màu trắng' }}" readonly />
                    </div>
                    <div class="modal-form-group">
                        <label class="modal-form-label">Số lượng tồn</label>
                        <input type="text" class="modal-form-input" value="{{ product.SoLuong|default:'50' }}" readonly />
                    </div>
                </div>
            </div>

            <div class="modal-right-col">
                <div class="modal-page-title">Mô tả sản phẩm</div>
                <div class="modal-desc-card">
                    <div class="modal-desc-wrapper">
                        <textarea class="modal-desc-textarea" readonly>Áo phông vải cotton mát lạnh mềm mại tạo cảm giác thoải mái khi mặc</textarea>
                    </div>
                </div>

                <div class="modal-action-buttons">
                    <a href="{% url 'products:product_list' %}" class="modal-btn modal-btn-cancel">Thoát</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
