{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Salavi – Chăm sóc khách hàng{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- TỆP CSS DÙNG CHUNG -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=5">
</head>

<body>

    <div class="header-top-container">
        <div class="header-top">
            <div class="logo">SALAVI</div>
            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm sản phẩm...">
            </div>
            <div class="header-icons">
                <div class="user-btn">
                    Salavi
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
                <div class="icon-list">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <header class="header-nav">
        <div class="nav-container">
            <nav class="nav">
                <a href="{% url 'cskh:dashboard' %}" class="{% if request.path == '/' %}active !text-gray-900{% endif %}">Trang chủ</a>
                <a href="{% url 'accounts:customer_list' %}" class="{% if 'customers' in request.path or 'accounts' in request.path %}active !text-gray-900{% endif %}">Khách hàng</a>
                <a href="{% url 'products:product_list' %}" class="{% if 'products' in request.path %}active !text-gray-900{% endif %}">Sản phẩm</a>
                <a href="{% url 'cskh:uudai_list' %}" class="{% if 'uudai' in request.path %}active !text-gray-900{% endif %}">Ưu đãi</a>
                <a href="{% url 'cskh:diem_tich_luy' %}" class="{% if 'tich-luy' in request.path %}active !text-gray-900{% endif %}">Tích điểm</a>
                <a href="{% url 'cskh:quan_ly_danh_gia' %}" class="{% if 'danh-gia' in request.path %}active !text-gray-900{% endif %}">Đánh giá</a>
                <a href="{% url 'orders:doitra_list' %}" class="{% if 'doitra' in request.path or 'orders' in request.path %}active !text-gray-900{% endif %}">Đổi trả</a>
            </nav>
            <div class="notification-bell">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="badge">3</span>
            </div>
        </div>
    </header>

    <!-- BLOCK CONTENT TRỐNG TẠI ĐÂY -->
    {% block content %}
    {% endblock %}

    <a href="{% url 'cskh:chat_reply' %}" class="support-btn" style="display: flex; text-decoration: none;">
        <svg viewBox="0 0 24 24">
            <path
                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
            <circle cx="8" cy="12" r="1" fill="#333" stroke="none" />
            <circle cx="12" cy="12" r="1" fill="#333" stroke="none" />
            <circle cx="16" cy="12" r="1" fill="#333" stroke="none" />
        </svg>
    </a>

</body>

</html>
