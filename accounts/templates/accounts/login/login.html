<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Nhóm 4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #fff8f8 0%, #f7f7f7 100%);
            font-family: 'Inter', sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            width: 100%;
            padding: 50px 40px;
            border-radius: 20px;
            background: #fff;
            text-align: center;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        .icon-header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: #ef8989;
        }

        .icon-header svg {
            width: 40px;
            fill: #fff;
        }

        h2 {
            margin: 0 0 35px;
            font-size: 28px;
            font-weight: 700;
            color: #111;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .label-text {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }

        .input-box {
            display: flex;
            align-items: center;
            padding: 18px;
            border-radius: 12px;
            background: #eee;
        }

        .input-box svg {
            width: 22px;
            height: 22px;
            min-width: 22px;
            margin-right: 15px;
            fill: #333;
        }

        .input-box input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: #333;
            font-family: 'Inter', sans-serif;
        }

        .input-box input::placeholder {
            color: #ccc;
            opacity: 1;
        }

        .login-trigger {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: #ef8989;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-trigger:hover {
            opacity: 0.9;
        }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #1f1f1f;
        }

        .login-footer p {
            margin: 0 0 10px;
        }

        .login-footer a {
            color: #ef8989;
            text-decoration: none;
            font-weight: 500;
            margin-left: 6px;
        }

        .forgot-link {
            display: inline-block;
            color: #ef8989;
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="icon-header">
                <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 5a3 3 0 0 1 6 0v3H9V7z"/></svg>
            </div>

            <h2>Đăng nhập</h2>

            <div class="input-group">
                <span class="label-text">Tên đăng nhập (SĐT)</span>
                <div class="input-box">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    <input type="text" placeholder="Nhập tên đăng nhập">
                </div>
            </div>

            <div class="input-group">
                <span class="label-text">Mật khẩu</span>
                <div class="input-box">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10h14V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></svg>
                    <input type="password" placeholder="Nhập mật khẩu">
                </div>
            </div>

            <button type="button" class="login-trigger">Đăng nhập</button>

            <div class="login-footer">
                <p>Chưa có tài khoản ? <a href="{% url 'accounts:register' %}">Tạo tài khoản</a></p>
                <a href="#" class="forgot-link">Quên mật khẩu ?</a>
            </div>
        </div>
    </div>
</body>
</html>
