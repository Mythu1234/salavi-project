<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salavi - Quên mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .icon-header {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            border-radius: 12px;
            background: #ef8989;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-header svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        h2 {
            margin-bottom: 25px;
            color: #000;
            font-size: 24px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 700;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 12px;
            background: #eee;
        }

        .input-wrapper svg {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
            color: #333;
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: #333;
            font-size: 14px;
        }

        .input-wrapper input::placeholder {
            color: #ccc;
        }

        .primary-btn,
        .secondary-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 46px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
        }

        .primary-btn {
            margin-top: 10px;
            background: #ef8989;
            color: #fff;
        }

        .secondary-btn {
            margin-top: 12px;
            border: 1px solid #d2d2d2;
            background: #fff;
            color: #111;
        }

        .footer-text {
            margin-top: 20px;
            color: #333;
            font-size: 14px;
        }

        .footer-text a {
            color: #ef8989;
            text-decoration: none;
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="icon-header">
            <svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm-3 5a3 3 0 1 1 6 0v3H9V6z"/></svg>
        </div>

        <h2>Quên mật khẩu</h2>

        {% if step == 'account' %}
        <div class="form-group">
            <label>Tên đăng nhập (SĐT)</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <input type="text" placeholder="Nhập tên đăng nhập">
            </div>
        </div>

        <a href="{% url 'accounts:forgot_password' %}?step=otp" class="primary-btn">Khôi phục mật khẩu</a>
        <div class="footer-text">
            Quay lại <a href="{% url 'accounts:login' %}">Trang đăng nhập</a>
        </div>
        {% elif step == 'otp' %}
        <div class="form-group">
            <label>Mã OTP</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg>
                <input type="text" placeholder="Nhập mã OTP">
            </div>
        </div>

        <a href="{% url 'accounts:forgot_password' %}?step=reset" class="primary-btn">Xác nhận</a>
        <a href="{% url 'accounts:forgot_password' %}?step=account" class="secondary-btn">Quay lại</a>
        <div class="footer-text">
            Quay lại <a href="{% url 'accounts:login' %}">Trang đăng nhập</a>
        </div>
        {% else %}
        <div class="form-group">
            <label>Mật khẩu mới</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <input type="password" placeholder="Nhập mật khẩu mới">
            </div>
        </div>

        <div class="form-group">
            <label>Mật khẩu xác nhận</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <input type="password" placeholder="Nhập mật khẩu xác nhận">
            </div>
        </div>

        <a href="#" class="primary-btn">Lưu</a>
        <a href="{% url 'accounts:forgot_password' %}?step=otp" class="secondary-btn">Quay lại</a>
        <div class="footer-text">
            Quay lại <a href="{% url 'accounts:login' %}">Trang đăng nhập</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
